<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>file-event-hub</title>

  <!-- diff2html CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
  <!-- highlight.js theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">

  <style>
    :root {
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---- Top Bar ---- */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #0f0f23;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    .top-bar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #c0c0e0;
      letter-spacing: 0.5px;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #888;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336;
      transition: background 0.3s ease;
    }

    .status-dot.connected {
      background: #00c853;
      box-shadow: 0 0 6px #00c853;
    }

    /* ---- Main Layout ---- */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ---- Left Panel ---- */
    .left-panel {
      width: 320px;
      min-width: 320px;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      background: #12122a;
    }

    .left-panel-header {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    .event-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .event-list::-webkit-scrollbar {
      width: 6px;
    }

    .event-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .event-list::-webkit-scrollbar-thumb {
      background: #3a3a5a;
      border-radius: 3px;
    }

    .event-list::-webkit-scrollbar-thumb:hover {
      background: #5a5a7a;
    }

    .event-card {
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s ease, border-color 0.15s ease;
      animation: slideIn 0.25s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .event-card:hover {
      background: #1e1e3a;
    }

    .event-card.active {
      background: #1e1e3a;
      border-left-color: #7c4dff;
    }

    .event-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .event-filename {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }

    .event-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .event-badge.edit {
      background: rgba(0, 200, 83, 0.15);
      color: #00c853;
    }

    .event-badge.write {
      background: rgba(33, 150, 243, 0.15);
      color: #2196f3;
    }

    .event-path {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-time {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
    }

    /* ---- Right Panel ---- */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1a1a2e;
    }

    /* Tab bar */
    .tab-bar {
      display: none;
      padding: 0 16px;
      border-bottom: 1px solid #2a2a4a;
      background: #12122a;
      flex-shrink: 0;
    }

    .tab-bar.visible {
      display: flex;
    }

    .tab-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #888;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn:hover {
      color: #c0c0e0;
    }

    .tab-btn.active {
      color: #e0e0e0;
      border-bottom-color: #7c4dff;
    }

    /* Content area */
    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 0;
    }

    .content-area::-webkit-scrollbar {
      width: 8px;
    }

    .content-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .content-area::-webkit-scrollbar-thumb {
      background: #3a3a5a;
      border-radius: 4px;
    }

    .content-area::-webkit-scrollbar-thumb:hover {
      background: #5a5a7a;
    }

    /* Placeholder */
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      font-size: 15px;
    }

    /* Diff view overrides for dark theme */
    .d2h-wrapper {
      background: #1a1a2e !important;
    }

    .d2h-file-header {
      background: #16213e !important;
      border-color: #2a2a4a !important;
      color: #c0c0e0 !important;
    }

    .d2h-file-wrapper {
      border-color: #2a2a4a !important;
      margin-bottom: 0 !important;
    }

    .d2h-code-side-linenumber,
    .d2h-code-linenumber {
      background: #12122a !important;
      color: #555 !important;
      border-color: #2a2a4a !important;
    }

    .d2h-code-side-line,
    .d2h-code-line {
      background: #1a1a2e !important;
      color: #e0e0e0 !important;
    }

    .d2h-del {
      background: rgba(244, 67, 54, 0.12) !important;
      border-color: #4a2020 !important;
    }

    .d2h-del .d2h-code-side-line,
    .d2h-del .d2h-code-line {
      background: rgba(244, 67, 54, 0.12) !important;
    }

    .d2h-ins {
      background: rgba(0, 200, 83, 0.10) !important;
      border-color: #1a4a2a !important;
    }

    .d2h-ins .d2h-code-side-line,
    .d2h-ins .d2h-code-line {
      background: rgba(0, 200, 83, 0.10) !important;
    }

    .d2h-cntx .d2h-code-side-line,
    .d2h-cntx .d2h-code-line {
      background: #1a1a2e !important;
    }

    .d2h-info {
      background: #16213e !important;
      color: #7c7caa !important;
      border-color: #2a2a4a !important;
    }

    .d2h-emptyplaceholder {
      background: #12122a !important;
      border-color: #2a2a4a !important;
    }

    .d2h-tag {
      background: #16213e !important;
      color: #888 !important;
    }

    .d2h-file-diff .d2h-del.d2h-change del,
    .d2h-file-diff .d2h-ins.d2h-change ins {
      background: rgba(255, 255, 0, 0.15) !important;
    }

    /* File view */
    .file-view {
      padding: 0;
    }

    .file-view-header {
      padding: 12px 20px;
      font-size: 13px;
      color: #888;
      background: #12122a;
      border-bottom: 1px solid #2a2a4a;
      font-family: var(--font-mono);
      word-break: break-all;
    }

    .file-view-code {
      position: relative;
    }

    .file-view-code pre {
      margin: 0;
      padding: 16px 16px 16px 0;
      background: #1a1a2e !important;
      overflow-x: auto;
    }

    .file-view-code code {
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
    }

    .file-view-code table {
      border-collapse: collapse;
      width: 100%;
    }

    .file-view-code .line-number {
      user-select: none;
      text-align: right;
      padding: 0 16px 0 16px;
      color: #444;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      vertical-align: top;
      width: 1px;
      white-space: nowrap;
    }

    .file-view-code .line-content {
      padding: 0 16px 0 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      white-space: pre;
    }

    /* Loading spinner */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #666;
    }

    .loading::after {
      content: '';
      width: 20px;
      height: 20px;
      border: 2px solid #3a3a5a;
      border-top-color: #7c4dff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state for event list */
    .event-list-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #444;
      font-size: 13px;
      padding: 20px;
      text-align: center;
    }

    /* Error state */
    .error-message {
      color: #f44336;
      padding: 20px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <h1>file-event-hub</h1>
    <div class="connection-status">
      <span class="status-text">Disconnected</span>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Left Panel: Event Timeline -->
    <div class="left-panel">
      <div class="left-panel-header">Events</div>
      <div class="event-list" id="eventList">
        <div class="event-list-empty" id="eventListEmpty">No events yet. Waiting for file changes...</div>
      </div>
    </div>

    <!-- Right Panel: Content Area -->
    <div class="right-panel">
      <div class="tab-bar" id="tabBar">
        <button class="tab-btn active" data-tab="diff" id="tabDiff">Diff</button>
        <button class="tab-btn" data-tab="file" id="tabFile">File</button>
      </div>
      <div class="content-area" id="contentArea">
        <div class="placeholder" id="placeholder">Select an event to view diff</div>
      </div>
    </div>
  </div>

  <!-- jsdiff -->
  <script src="https://cdn.jsdelivr.net/npm/diff@5/dist/diff.min.js"></script>
  <!-- diff2html -->
  <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html-ui.min.js"></script>
  <!-- highlight.js -->
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

  <script>
    // ---- State ----
    const state = {
      events: [],
      selectedEventId: null,
      activeTab: 'diff',
      ws: null,
    };

    // ---- DOM References ----
    const $eventList = document.getElementById('eventList');
    const $eventListEmpty = document.getElementById('eventListEmpty');
    const $contentArea = document.getElementById('contentArea');
    const $tabBar = document.getElementById('tabBar');
    const $tabDiff = document.getElementById('tabDiff');
    const $tabFile = document.getElementById('tabFile');
    const $statusDot = document.getElementById('statusDot');
    const $statusText = document.querySelector('.status-text');

    // ---- Utility Functions ----

    function basename(filePath) {
      if (!filePath) return 'unknown';
      const parts = filePath.replace(/\\/g, '/').split('/');
      return parts[parts.length - 1] || filePath;
    }

    function relativeTime(timestamp) {
      const now = Date.now();
      const ts = typeof timestamp === 'number' ? timestamp * 1000 : new Date(timestamp).getTime();
      const diff = Math.max(0, Math.floor((now - ts) / 1000));

      if (diff < 5) return 'just now';
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }

    function getToolType(event) {
      const tool = (event.tool_name || event.tool || '').toLowerCase();
      if (tool === 'write' || tool === 'write_to_file') return 'write';
      return 'edit';
    }

    function getEventId(event) {
      return event.id || event.timestamp || Math.random().toString(36).slice(2);
    }

    // ---- Connection Status ----

    function updateStatus(connected) {
      if (connected) {
        $statusDot.classList.add('connected');
        $statusText.textContent = 'Connected';
      } else {
        $statusDot.classList.remove('connected');
        $statusText.textContent = 'Disconnected';
      }
    }

    // ---- Event List Rendering ----

    function renderEventCard(event) {
      const id = getEventId(event);
      const type = getToolType(event);
      const name = basename(event.file_path);
      const path = event.file_path || '';
      const time = relativeTime(event.timestamp);
      const isActive = state.selectedEventId === id;

      const card = document.createElement('div');
      card.className = `event-card${isActive ? ' active' : ''}`;
      card.dataset.eventId = id;
      card.innerHTML = `
        <div class="event-card-top">
          <span class="event-filename" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
          <span class="event-badge ${type}">${type}</span>
        </div>
        <div class="event-path" title="${escapeHtml(path)}">${escapeHtml(path)}</div>
        <div class="event-time" data-timestamp="${event.timestamp}">${time}</div>
      `;

      card.addEventListener('click', () => selectEvent(event));
      return card;
    }

    function escapeHtml(str) {
      const el = document.createElement('span');
      el.textContent = str;
      return el.innerHTML;
    }

    function prependEvent(event) {
      // Assign an id if missing
      if (!event.id) {
        event.id = getEventId(event);
      }

      // Avoid duplicates
      const exists = state.events.some(e => getEventId(e) === getEventId(event));
      if (exists) return;

      state.events.unshift(event);

      // Cap stored events to prevent unbounded memory growth
      const MAX_EVENTS = 500;
      if (state.events.length > MAX_EVENTS) {
        state.events.length = MAX_EVENTS;
        const cards = $eventList.querySelectorAll('.event-card');
        for (let i = MAX_EVENTS; i < cards.length; i++) cards[i].remove();
      }

      // Hide empty state
      $eventListEmpty.style.display = 'none';

      // Prepend card
      const card = renderEventCard(event);
      $eventList.insertBefore(card, $eventList.firstChild === $eventListEmpty ? $eventListEmpty.nextSibling : $eventList.firstChild);
    }

    function renderAllEvents() {
      // Remove all cards except the empty placeholder
      const cards = $eventList.querySelectorAll('.event-card');
      cards.forEach(c => c.remove());

      if (state.events.length === 0) {
        $eventListEmpty.style.display = '';
        return;
      }

      $eventListEmpty.style.display = 'none';
      state.events.forEach(event => {
        const card = renderEventCard(event);
        $eventList.appendChild(card);
      });
    }

    function updateActiveCard() {
      const cards = $eventList.querySelectorAll('.event-card');
      cards.forEach(card => {
        card.classList.toggle('active', card.dataset.eventId === String(state.selectedEventId));
      });
    }

    // ---- Relative Time Updates ----

    setInterval(() => {
      const timeEls = $eventList.querySelectorAll('.event-time[data-timestamp]');
      timeEls.forEach(el => {
        el.textContent = relativeTime(el.dataset.timestamp);
      });
    }, 5000);

    // ---- Event Selection & Content ----

    function selectEvent(event) {
      state.selectedEventId = getEventId(event);
      state.activeTab = 'diff';
      updateActiveCard();
      $tabBar.classList.add('visible');
      $tabDiff.classList.add('active');
      $tabFile.classList.remove('active');
      showDiffView(event);
    }

    function getSelectedEvent() {
      return state.events.find(e => getEventId(e) === state.selectedEventId) || null;
    }

    // ---- Tab Switching ----

    $tabDiff.addEventListener('click', () => {
      if (state.activeTab === 'diff') return;
      state.activeTab = 'diff';
      $tabDiff.classList.add('active');
      $tabFile.classList.remove('active');
      const event = getSelectedEvent();
      if (event) showDiffView(event);
    });

    $tabFile.addEventListener('click', () => {
      if (state.activeTab === 'file') return;
      state.activeTab = 'file';
      $tabFile.classList.add('active');
      $tabDiff.classList.remove('active');
      const event = getSelectedEvent();
      if (event) showFileView(event);
    });

    // ---- Diff View ----

    function showDiffView(event) {
      const type = getToolType(event);
      let oldStr = '';
      let newStr = '';

      if (type === 'edit') {
        oldStr = event.old_text || event.old_content || '';
        newStr = event.new_text || event.new_content || '';
      } else {
        // Write: everything is new
        oldStr = '';
        newStr = event.new_content || event.content || '';
      }

      const filePath = event.file_path || 'unknown';
      const unifiedDiff = Diff.createTwoFilesPatch(filePath, filePath, oldStr, newStr, '', '', { context: 3 });

      $contentArea.innerHTML = '';

      const diffContainer = document.createElement('div');
      diffContainer.id = 'diffContainer';
      $contentArea.appendChild(diffContainer);

      try {
        const diff2htmlUi = new Diff2HtmlUI(diffContainer, unifiedDiff, {
          drawFileList: false,
          matching: 'lines',
          outputFormat: 'side-by-side',
          highlight: true,
        });
        diff2htmlUi.draw();
        diff2htmlUi.highlightCode();
      } catch (err) {
        // Fallback: show raw diff
        $contentArea.innerHTML = `<pre style="padding:20px; color:#e0e0e0; font-family:monospace; white-space:pre-wrap;">${escapeHtml(unifiedDiff)}</pre>`;
      }
    }

    // ---- File View ----

    async function showFileView(event) {
      const filePath = event.file_path;
      if (!filePath) {
        $contentArea.innerHTML = '<div class="error-message">No file path available</div>';
        return;
      }

      $contentArea.innerHTML = '<div class="loading">Loading file</div>';

      try {
        const encodedPath = encodeURIComponent(filePath);
        const resp = await fetch(`/api/files/${encodedPath}`);
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        }

        const data = await resp.json();
        const content = data.content || '';
        const lang = guessLanguage(filePath);

        let highlighted;
        try {
          if (lang && hljs.getLanguage(lang)) {
            highlighted = hljs.highlight(content, { language: lang }).value;
          } else {
            highlighted = hljs.highlightAuto(content).value;
          }
        } catch (e) {
          highlighted = escapeHtml(content);
        }

        const lines = highlighted.split('\n');
        const tableRows = lines.map((line, i) =>
          `<tr><td class="line-number">${i + 1}</td><td class="line-content">${line || ' '}</td></tr>`
        ).join('');

        $contentArea.innerHTML = `
          <div class="file-view">
            <div class="file-view-header">${escapeHtml(filePath)}</div>
            <div class="file-view-code">
              <pre><code><table>${tableRows}</table></code></pre>
            </div>
          </div>
        `;
      } catch (err) {
        $contentArea.innerHTML = `<div class="error-message">Failed to load file: ${escapeHtml(err.message)}</div>`;
      }
    }

    function guessLanguage(filePath) {
      const ext = filePath.split('.').pop().toLowerCase();
      const map = {
        py: 'python', js: 'javascript', ts: 'typescript', tsx: 'typescript',
        jsx: 'javascript', json: 'json', html: 'html', css: 'css',
        md: 'markdown', sh: 'bash', bash: 'bash', zsh: 'bash',
        rs: 'rust', go: 'go', java: 'java', c: 'c', cpp: 'cpp',
        h: 'c', hpp: 'cpp', rb: 'ruby', yml: 'yaml', yaml: 'yaml',
        toml: 'toml', xml: 'xml', sql: 'sql', swift: 'swift',
        kt: 'kotlin', scala: 'scala', r: 'r', lua: 'lua',
        php: 'php', pl: 'perl', vim: 'vim', dockerfile: 'dockerfile',
      };
      return map[ext] || null;
    }

    // ---- WebSocket ----

    function connectWebSocket() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}/ws`);
      state.ws = ws;

      ws.onopen = () => {
        updateStatus(true);
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'new_event') {
            prependEvent(msg.event);
          }
        } catch (err) {
          // Ignore parse errors
        }
      };

      ws.onclose = () => {
        updateStatus(false);
        state.ws = null;
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    // ---- Initial Load ----

    async function loadInitialEvents() {
      try {
        const resp = await fetch('/api/events?limit=50');
        if (!resp.ok) return;
        const data = await resp.json();
        const events = Array.isArray(data) ? data : (data.events || []);

        // Events should be newest first; if not, sort descending
        events.sort((a, b) => {
          const ta = typeof a.timestamp === 'number' ? a.timestamp : new Date(a.timestamp).getTime() / 1000;
          const tb = typeof b.timestamp === 'number' ? b.timestamp : new Date(b.timestamp).getTime() / 1000;
          return tb - ta;
        });

        state.events = events;
        renderAllEvents();
      } catch (err) {
        // Server might not be ready yet, that's okay
      }
    }

    // ---- Bootstrap ----

    (async function init() {
      await loadInitialEvents();
      connectWebSocket();
    })();
  </script>
</body>
</html>
